<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: transparent; }
  .box {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    overflow: hidden;
    text-align: center;
    color: #4b5563;
  }
  .header { padding: 30px 20px 10px; }
  .content { padding: 20px 30px 30px; }
  h2 {
    font-family: 'Playfair Display', serif;
    color: #1e293b;
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 10px;
  }
  .sub { font-size: 14px; color: #6b7280; margin: 0; }
  .label {
    display: block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; color: #cca876;
    margin-bottom: 8px; text-align: left;
  }
  .row {
    display: flex;
    background: #fff9f0;
    border: 1px solid rgba(204,168,118,0.3);
    border-radius: 6px;
    padding: 4px;
    margin-bottom: 5px;
    align-items: center;
  }
  .url {
    flex: 1; border: none; background: transparent;
    padding: 10px 8px; font-size: 13px; color: #555;
    outline: none; min-width: 0;
  }
  .btn {
    cursor: pointer; border: none; border-radius: 4px;
    font-weight: 700; font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    text-decoration: none; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-copy {
    background: #cca876; color: #fff;
    padding: 10px 18px; border-radius: 6px; white-space: nowrap;
  }
  .fb {
    color: #cca876; font-size: 12px; height: 20px;
    margin-top: 6px; opacity: 0; transition: opacity 0.3s;
  }
  .divider {
    display: flex; align-items: center; margin: 20px 0;
    font-size: 11px; text-transform: uppercase; color: #ccc;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; border-top: 1px solid #eee; margin: 0 10px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }
  .social {
    padding: 12px; border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer; text-decoration: none;
    font-weight: 700; font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: opacity 0.2s;
  }
  .social:hover { opacity: 0.85; }
  .wa { background: #f0fdf4; color: #15803d; border-color: #dcfce7; }
  .mail { background: #f9fafb; color: #374151; border-color: #e5e7eb; }
</style>
</head>
<body>

<div class="box">
  <div class="header">
    <i class="fas fa-gift" style="font-size:40px;color:#cca876;margin-bottom:15px;"></i>
    <h2>Teile diesen Kurs</h2>
    <p class="sub">Kennst du jemanden, dem dieser Inhalt auch helfen würde?</p>
  </div>

  <div class="content">
    <span class="label">Dein Einladungs-Link</span>
    <div class="row">
      <input type="text" class="url" id="shareUrl" readonly
        value="https://myablefy.com/s/female-mastery/masterclass-kurs/payment">
      <button class="btn btn-copy" id="copyBtn">
        <i class="far fa-copy" style="margin-right:6px;"></i>
        <span id="btnLabel">Kopieren</span>
      </button>
    </div>
    <div class="fb" id="feedback">
      <i class="fas fa-check"></i> Link kopiert!
    </div>

    <div class="divider">Oder direkt teilen</div>

    <div class="grid">
      <a class="social wa" id="waBtn" href="#" target="_blank" rel="noopener">
        <i class="fab fa-whatsapp" style="margin-right:8px;font-size:18px;"></i> WhatsApp
      </a>
      <a class="social mail" id="mailBtn" href="#">
        <i class="far fa-envelope" style="margin-right:8px;font-size:16px;"></i> E-Mail
      </a>
    </div>
  </div>
</div>

<script>
var SHARE_URL = 'https://myablefy.com/s/female-mastery/masterclass-kurs/payment';
var SHARE_TEXT = 'Ich habe diesen kostenlosen Kurs gemacht und er hat mir die Augen geöffnet. Schau ihn dir mal an:';

// Kopieren
document.getElementById('copyBtn').addEventListener('click', function() {
  var scrollX = window.scrollX;
  var scrollY = window.scrollY;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(SHARE_URL).then(function() {
      showSuccess();
    }).catch(function() {
      fallbackCopy();
    });
    return;
  }

  fallbackCopy();

  function fallbackCopy() {
    var ok = false;
    var ta = document.createElement('textarea');
    ta.value = SHARE_URL;
    ta.setAttribute('readonly', '');
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px';
    document.body.appendChild(ta);
    ta.focus({ preventScroll: true });
    ta.select();
    try { ok = document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    window.scrollTo(scrollX, scrollY);
    if (!ok) { prompt('Kopiere diesen Link:', SHARE_URL); return; }
    showSuccess();
  }

  function showSuccess() {
    var fb = document.getElementById('feedback');
    var bl = document.getElementById('btnLabel');
    fb.style.opacity = '1';
    bl.textContent = '\u2713 Kopiert!';
    setTimeout(function() { fb.style.opacity = '0'; bl.textContent = 'Kopieren'; }, 2500);
  }
});

// WhatsApp
document.getElementById('waBtn').href =
  'https://api.whatsapp.com/send?text=' + encodeURIComponent(SHARE_TEXT + '\n\n' + SHARE_URL);

// E-Mail
document.getElementById('mailBtn').href =
  'mailto:?subject=' + encodeURIComponent('Tipp: Kostenloser Kurs für dich') +
  '&body=' + encodeURIComponent(SHARE_TEXT + '\r\n\r\n' + SHARE_URL);
</script>

</body>
</html>
